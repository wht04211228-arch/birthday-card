<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>真正的生日惊喜｜专属贺卡</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body{overflow-x:hidden}.surprise-page{position:relative;z-index:2;width:min(1080px,92vw);margin:auto;padding:52px 0 80px}.surprise-hero{padding:56px;text-align:center;margin-bottom:28px}.surprise-hero h1{font-size:clamp(46px,8vw,96px);line-height:1;margin:18px 0;background:linear-gradient(90deg,#fff,#ffd166,#ff9ad0);-webkit-background-clip:text;color:transparent}.surprise-hero p{color:rgba(255,255,255,.78);font-size:20px;line-height:1.9}.surprise-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:22px}.memory-wall{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.memory-wall div{min-height:220px;border-radius:24px;background-size:cover;background-position:center;box-shadow:0 24px 70px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.14)}.surprise-card{padding:32px}.surprise-card h2{font-size:34px;margin:10px 0 14px}.surprise-card p{color:rgba(255,255,255,.78);line-height:1.9}.voice-big{display:flex;align-items:center;gap:16px;margin-top:20px;padding:18px;border-radius:22px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16)}.back-link{display:inline-flex;margin-top:24px;text-decoration:none}.final-letter{grid-column:1/-1;padding:38px}.final-letter p{font-size:20px;line-height:2;color:rgba(255,255,255,.82)}@media(max-width:860px){.surprise-grid{grid-template-columns:1fr}.memory-wall{grid-template-columns:1fr 1fr}.surprise-hero{padding:34px}.final-letter p{font-size:17px}}
  </style>
</head>
<body>
  <canvas id="starsCanvas"></canvas>
  <canvas id="fireworksCanvas"></canvas>
  <audio id="bgMusic" loop preload="metadata"><source src="./assets/music.mp3" type="audio/mpeg" /></audio>
  <audio id="voiceAudio" preload="metadata"><source src="./assets/voice.mp3" type="audio/mpeg" /></audio>
  <main class="surprise-page">
    <section class="surprise-hero glass">
      <p class="eyebrow">Gift Box Unlocked</p>
      <h1><span id="surpriseName">亲爱的你</span><br>这是藏在礼物盒里的真正惊喜</h1>
      <p id="surpriseSubtitle">愿这一刻的光、音乐、照片和祝福，都只属于你。</p>
      <div class="hero-actions" style="justify-content:center">
        <button class="btn primary" id="playAllBtn">播放音乐与真人录音</button>
        <button class="btn ghost" id="fireworkAgainBtn">再放一次烟花</button>
        <a class="btn ghost back-link" href="./index.html">返回礼物盒</a>
      </div>
    </section>
    <section class="surprise-grid">
      <div class="memory-wall">
        <div id="m1" style="background-image:url('./assets/photo1.jpg')"></div>
        <div id="m2" style="background-image:url('./assets/photo2.jpg')"></div>
        <div id="m3" style="background-image:url('./assets/photo3.jpg')"></div>
      </div>
      <article class="surprise-card glass">
        <p class="eyebrow">Real Voice Blessing</p>
        <h2 id="voiceTitle2">真人录音祝福</h2>
        <p id="voiceHint2">这里会播放 assets/voice.mp3。上线时把客户录音放进 assets 文件夹即可。</p>
        <div class="voice-big">
          <div class="voice-wave" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
          <button class="btn primary" id="voiceBtn2">播放真人录音</button>
        </div>
      </article>
      <article class="final-letter glass">
        <p class="eyebrow">Final Letter</p>
        <h2>写给你的最后一页</h2>
        <p id="finalLetterText">今天是你的生日，我想把所有温柔都写进这个网页里。愿你每一天都有热爱的事、期待的人、发光的自己。无论未来多远，我都希望你一直被爱包围。</p>
      </article>
    </section>
  </main>
  <script src="./config.js"></script>
  <script>
    const cfg=window.CARD_CONFIG||{};const $=s=>document.querySelector(s);
    $('#surpriseName').textContent=cfg.receiverName||'亲爱的你';
    $('#surpriseSubtitle').textContent=cfg.giftText||'愿这一刻的光、音乐、照片和祝福，都只属于你。';
    $('#finalLetterText').textContent=cfg.letter||$('#finalLetterText').textContent;
    $('#voiceTitle2').textContent=cfg.voiceTitle||'真人录音祝福';
    $('#voiceHint2').textContent=cfg.voiceHint||'把录音文件命名为 voice.mp3，放入 assets 文件夹即可上线。';
    if(Array.isArray(cfg.photos)){['#m1','#m2','#m3'].forEach((id,i)=>{if(cfg.photos[i])$(id).style.backgroundImage=`url('${cfg.photos[i]}')`})}
    function stars(){const c=$('#starsCanvas'),ctx=c.getContext('2d');let w,h,stars=[];function resize(){w=c.width=innerWidth;h=c.height=innerHeight;stars=Array.from({length:150},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.8,v:.25+Math.random()*.65}))}resize();addEventListener('resize',resize);function draw(){ctx.clearRect(0,0,w,h);ctx.fillStyle='rgba(255,255,255,.8)';stars.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.y+=p.v;if(p.y>h)p.y=0});requestAnimationFrame(draw)}draw()}
    const fw={particles:[]};function launchFireworks(){const colors=['#ff6fae','#ffd166','#8ec5ff','#ffffff','#ff9d6c'];for(let j=0;j<6;j++){const x=Math.random()*innerWidth,y=Math.random()*innerHeight*.5+70;for(let i=0;i<64;i++)fw.particles.push({x,y,vx:Math.cos(i/64*Math.PI*2)*(2+Math.random()*5),vy:Math.sin(i/64*Math.PI*2)*(2+Math.random()*5),life:70,color:colors[Math.floor(Math.random()*colors.length)]})}}
    function fireworksLoop(){const c=$('#fireworksCanvas'),ctx=c.getContext('2d');function resize(){c.width=innerWidth;c.height=innerHeight}resize();addEventListener('resize',resize);function draw(){ctx.clearRect(0,0,c.width,c.height);fw.particles=fw.particles.filter(p=>p.life>0);fw.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.035;p.life--;ctx.globalAlpha=p.life/70;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,2.2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1});requestAnimationFrame(draw)}draw()}
    async function playAll(){try{await $('#bgMusic').play();}catch(e){} try{$('#bgMusic').volume=.25;await $('#voiceAudio').play();}catch(e){alert('请把 voice.mp3 放入 assets 文件夹，或先点击页面后再播放。')}}
    $('#playAllBtn').onclick=playAll;$('#voiceBtn2').onclick=()=>$('#voiceAudio').play().catch(()=>alert('请把 voice.mp3 放入 assets 文件夹。'));$('#fireworkAgainBtn').onclick=launchFireworks;
    stars();fireworksLoop();setTimeout(launchFireworks,500);
  </script>
</body>
</html>
